name: Update Floating Tag

on:
  release:
    types: [published]

jobs:
  update-floating-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update floating major tag
        run: |
          MAJOR=$(echo "${{ github.ref_name }}" | cut -d. -f1)
          git tag -fa $MAJOR -m "Update $MAJOR tag to ${{ github.ref_name }}"
          git push origin $MAJOR --force
